<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <style>
        :root {
            --base: #1e1e2e;
            --surface0: #313244;
            --surface1: #45475a;
            --text: #cdd6f4;
            --subtext: #a6adc8;
            --accent: #a6e3a1;
        }

        body {
            width: 260px;
            margin: 0;
            background: var(--base);
            color: var(--text);
            font-family: 'Segoe UI', system-ui, sans-serif;
            padding: 20px;
            box-sizing: border-box;
        }

        .header {
            text-align: center;
            margin-bottom: 24px;
        }

        .header h3 {
            margin: 0;
            font-size: 18px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .header p {
            margin: 4px 0 0 0;
            font-size: 12px;
            color: var(--subtext);
        }

        .control-group {
            background: var(--surface0);
            padding: 16px;
            border-radius: 12px;
            margin-bottom: 16px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.2);
        }

        .row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .label {
            font-size: 14px;
            font-weight: 500;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 44px;
            height: 24px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider-toggle {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: var(--surface1);
            transition: .3s;
            border-radius: 24px;
        }

        .slider-toggle:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: var(--text);
            transition: .3s;
            border-radius: 50%;
        }

        input:checked+.slider-toggle {
            background-color: var(--accent);
        }

        input:checked+.slider-toggle:before {
            transform: translateX(20px);
            background-color: var(--base);
        }

        .slider-container {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
            margin: 0;
        }

        input[type="range"]:focus {
            outline: none;
        }

        input[type="range"]::-webkit-slider-runnable-track {
            width: 100%;
            height: 6px;
            cursor: pointer;
            background: var(--surface1);
            border-radius: 4px;
        }

        input[type="range"]::-webkit-slider-thumb {
            height: 16px;
            width: 16px;
            border-radius: 50%;
            background: var(--accent);
            cursor: pointer;
            -webkit-appearance: none;
            margin-top: -5px;
            box-shadow: 0 0 10px rgba(203, 166, 247, 0.4);
            transition: transform 0.1s ease;
        }

        input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }

        .value-display {
            text-align: center;
            font-size: 28px;
            font-weight: bold;
            color: var(--accent);
            margin-top: 4px;
        }

        .comp-label {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: var(--subtext);
            margin-bottom: -8px;
        }

        .reset-btn {
            background: var(--surface1);
            color: var(--text);
            border: none;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            font-size: 13px;
            font-weight: 600;
            margin-top: 12px;
            transition: background 0.2s ease;
        }

        .reset-btn:hover {
            background: var(--surface0);
            color: var(--accent);
        }
    </style>
</head>

<body>
    <div class="header">
        <h3>Simple Volume Booster</h3>
        <p>Boost current tab audio</p>
    </div>

    <div class="control-group">
        <div class="row">
            <span class="label">Enable</span>
            <label class="switch">
                <input type="checkbox" id="enable">
                <span class="slider-toggle"></span>
            </label>
        </div>
    </div>

    <div class="control-group slider-container">
        <div class="row">
            <span class="label">Boost</span>
        </div>
        <input type="range" id="slider" min="1" max="5" step="0.1" value="1">
        <div class="value-display" id="value">100%</div>
    </div>

    <div class="control-group slider-container">
        <div class="row">
            <span class="label">Compressor</span>
        </div>

        <div class="comp-label">
            <span>Threshold</span>
            <span><span id="threshold-val">0</span> dB</span>
        </div>
        <input type="range" id="threshold" min="-50" max="0" step="1" value="0">

        <div class="comp-label">
            <span>Ratio</span>
            <span><span id="ratio-val">4</span>:1</span>
        </div>
        <input type="range" id="ratio" min="1" max="20" step="0.1" value="4">

        <div class="comp-label">
            <span>Attack</span>
            <span><span id="attack-val">20</span> ms</span>
        </div>
        <input type="range" id="attack" min="0" max="0.500" step="0.001" value="0.020">

        <div class="comp-label">
            <span>Release</span>
            <span><span id="release-val">200</span> ms</span>
        </div>
        <input type="range" id="release" min="0" max="0.500" step="0.01" value="0.20">

        <button id="reset-comp" class="reset-btn">Reset Compressor</button>
    </div>

    <script src="popup.js"></script>
</body>

</html>
